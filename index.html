<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
  Сыни және аналитикалық ойлау — 2-нұсқа
</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --primary-light: #dbeafe;

  --background: #f3f6fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --border: #d7deea;

  --correct: #15803d;
  --correct-background: #dcfce7;

  --wrong: #b91c1c;
  --wrong-background: #fee2e2;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
}

header {
  padding: 34px 16px 58px;
  background:
    linear-gradient(
      135deg,
      #1d4ed8,
      #3b82f6
    );
  color: white;
  text-align: center;
}

header h1 {
  margin: 0 0 10px;
  font-size: 34px;
  line-height: 1.2;
}

header p {
  margin: 0;
  font-size: 17px;
  opacity: 0.95;
}

.container {
  width: min(
    960px,
    calc(100% - 24px)
  );
  margin: -32px auto 55px;
}
  .section-navigation {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
  margin-bottom: 18px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.09);
}

.section-button {
  border: 2px solid var(--border);
  border-radius: 13px;
  padding: 16px 12px;
  background: #f8fafc;
  color: #344054;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
}

.section-button.active {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

.section-button.locked {
  opacity: 0.55;
  cursor: not-allowed;
}

.test-section {
  display: none;
}

.test-section.active {
  display: block;
}

.section-header {
  padding: 22px;
  margin-bottom: 15px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.08);
}

.section-header h2 {
  margin: 0 0 7px;
  color: var(--primary);
  font-size: 28px;
}

.section-header p {
  margin: 0;
  color: var(--muted);
}

.section-information {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 13px;
}

.information-badge {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 800;
}

.progress-card {
  padding: 16px 18px;
  margin-bottom: 15px;
  background: white;
  border-radius: 15px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.progress-information {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 9px;
  color: var(--muted);
}

.progress-information strong {
  color: var(--primary);
}

.progress-line {
  width: 100%;
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #dce4f0;
}

.progress-line span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.25s;
}
  .question {
  padding: 21px;
  margin-bottom: 15px;
  background: var(--card);
  border: 1px solid #dce3ee;
  border-radius: 16px;
  box-shadow:
    0 4px 17px
    rgba(31, 41, 55, 0.06);
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  height: 35px;
  margin-bottom: 12px;
  padding: 0 11px;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-weight: 900;
}

.question-title {
  margin: 0 0 16px;
  font-size: 18px;
  line-height: 1.55;
}

.math {
  font-family:
    "Times New Roman",
    Georgia,
    serif;
  font-size: 22px;
}

.visual-box {
  margin: 5px 0 18px;
  padding: 14px;
  overflow-x: auto;
  border: 1px solid #dce3ee;
  border-radius: 14px;
  background: #ffffff;
  text-align: center;
}

.visual-box svg {
  display: block;
  width: min(100%, 620px);
  height: auto;
  margin: 0 auto;
}

.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  margin: 5px 0 18px;
  overflow: hidden;
  border: 1.5px solid #475569;
  border-radius: 8px;
}

.comparison-cell {
  min-height: 110px;
  padding: 14px;
  font-family:
    "Times New Roman",
    Georgia,
    serif;
  font-size: 19px;
}

.comparison-cell + .comparison-cell {
  border-left: 1.5px solid #475569;
}

.comparison-title {
  display: block;
  margin-bottom: 9px;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  font-weight: 900;
}

.options {
  display: grid;
  gap: 9px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  transition: 0.18s;
}

.option:hover {
  border-color: #93b4f6;
  background: #f8fbff;
}

.option input {
  flex: 0 0 auto;
  margin-top: 4px;
  transform: scale(1.15);
  accent-color: var(--primary);
}

.option-letter {
  flex: 0 0 27px;
  color: #475467;
  font-weight: 900;
}
  .option.correct {
  border-color: #22c55e;
  background: var(--correct-background);
  color: #166534;
}

.option.wrong {
  border-color: #ef4444;
  background: var(--wrong-background);
  color: #991b1b;
}

.explanation {
  display: none;
  margin-top: 17px;
  padding-top: 16px;
  border-top: 1px solid #e4e7ec;
}

.question.checked .explanation {
  display: block;
}

.question-score {
  margin-bottom: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  font-weight: 900;
}

.question-score.full {
  background: var(--correct-background);
  color: #166534;
}

.question-score.zero {
  background: var(--wrong-background);
  color: #991b1b;
}

.correct-answer {
  padding: 12px 14px;
  border-radius: 11px;
  background: var(--correct-background);
  color: #166534;
  font-weight: 800;
}

.explanation-title {
  margin: 14px 0 7px;
  color: var(--primary-dark);
  font-size: 17px;
  font-weight: 900;
}

.explanation-text {
  margin: 0;
  padding: 13px 14px;
  border-radius: 11px;
  background: #f7faff;
}

.solution-steps {
  margin: 0;
  padding-left: 24px;
}

.solution-steps li {
  margin-bottom: 9px;
}

.solution-steps li:last-child {
  margin-bottom: 0;
}

.solution-formula {
  display: block;
  margin-top: 5px;
  font-family:
    "Times New Roman",
    Georgia,
    serif;
  font-size: 19px;
  font-weight: 700;
}

.key-fact {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid var(--primary);
  border-radius: 8px;
  background: var(--primary-light);
  font-weight: 750;
}
  .result-card{
display:none;
margin:20px 0;
padding:24px;
border-radius:18px;
background:white;
text-align:center;
box-shadow:0 5px 18px rgba(31,41,55,.08);
}

.result-card.show{
display:block;
}

.result-card h3{
margin:0 0 12px;
color:var(--primary);
font-size:28px;
}

.score{
font-size:42px;
font-weight:900;
color:var(--primary-dark);
}

.actions{
display:flex;
flex-wrap:wrap;
gap:14px;
justify-content:center;
margin:28px 0 50px;
}

button{
border:none;
cursor:pointer;
border-radius:14px;
padding:16px 28px;
font-size:17px;
font-weight:800;
transition:.2s;
}

.show-result-button{
background:var(--primary);
color:#fff;
}

.show-result-button:hover{
background:var(--primary-dark);
}

.reset-button{
background:#eef4ff;
color:var(--primary-dark);
}

.reset-button:hover{
background:#dbeafe;
}

@media(max-width:768px){

.question{
padding:18px;
}

.question-title{
font-size:18px;
}

.comparison-grid{
grid-template-columns:1fr;
}

.comparison-cell+.comparison-cell{
border-left:none;
border-top:1.5px solid #475569;
}

.score{
font-size:34px;
}

header h1{
font-size:28px;
}

}

</style>
</head>

<script>

const letters = [
  "A",
  "B",
  "C",
  "D",
  "E"
];

const criticalQuestions = [
  {
number:1,

question:"A және Б шамаларын салыстырыңыз.",

visual:`
<div class="comparison-grid">

  <div class="comparison-cell">
    <span class="comparison-title">
      A шамасы
    </span>

    <div class="math">
      5 санының 20%
    </div>
  </div>

  <div class="comparison-cell">
    <span class="comparison-title">
      Б шамасы
    </span>

    <div class="math">
      2
    </div>
  </div>

</div>
`,

options:[
"Екі шама тең",
"Б шамасы үлкен",
"Шамаларды салыстыру үшін ақпарат жеткіліксіз",
"А шамасы үлкен"
],

correct:1,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
А шамасын есептейміз:
<span class="solution-formula">
5 · 20 / 100 = 1
</span>
</li>

<li>
<b>2-қадам.</b>
Б шамасы есептің шартында берілген:
<span class="solution-formula">
Б = 2
</span>
</li>

<li>
<b>3-қадам.</b>
Екі шаманы салыстырамыз:
<span class="solution-formula">
1 &lt; 2
</span>
</li>

<li>
<b>Қорытынды:</b>
Б шамасы үлкен.
</li>

</ol>
`,

keyFact:"А = 1, Б = 2. Сондықтан Б шамасы үлкен."
},

{
number:2,

question:"Теңсіздікті шешіңіз:",

visual:`
<div class="visual-box math">
(y + 1)(y² − y + 1) ≥ −26
</div>
`,

options:[
"[−3; +∞)",
"(−3; 3)",
"(−∞; −3) ∪ (3; +∞)",
"(−∞; −3] ∪ [3; +∞)",
"(−3; 3]"
],

correct:0,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
Қысқаша көбейту формуласын қолданамыз:
<span class="solution-formula">
(a + b)(a² − ab + b²) = a³ + b³
</span>
</li>

<li>
<b>2-қадам.</b>
Берілген көбейтіндіні ықшамдаймыз:
<span class="solution-formula">
(y + 1)(y² − y + 1) = y³ + 1
</span>
</li>

<li>
<b>3-қадам.</b>
Теңсіздік:
<span class="solution-formula">
y³ + 1 ≥ −26
</span>
</li>

<li>
<b>4-қадам.</b>
<span class="solution-formula">
y³ ≥ −27
</span>
</li>

<li>
<b>5-қадам.</b>
Кубтық функция өспелі болғандықтан:
<span class="solution-formula">
y ≥ −3
</span>
</li>

<li>
<b>Жауабы:</b>
[−3; +∞).
</li>

</ol>
`,

keyFact:"Теңсіздіктің шешімі: [−3; +∞)."
},

{
number:3,

question:"32 − 7y өрнегінің мәні 11 санына тең болатындай y-тің мәнін табыңыз.",

options:[
"5",
"3",
"2",
"4",
"1"
],

correct:1,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
Өрнекті 11-ге теңестіреміз:
<span class="solution-formula">
32 − 7y = 11
</span>
</li>

<li>
<b>2-қадам.</b>
32 санын оң жаққа өткіземіз:
<span class="solution-formula">
−7y = 11 − 32
</span>
</li>

<li>
<b>3-қадам.</b>
<span class="solution-formula">
−7y = −21
</span>
</li>

<li>
<b>4-қадам.</b>
Екі жағын −7-ге бөлеміз:
<span class="solution-formula">
y = 3
</span>
</li>

</ol>
`,

keyFact:"y = 3."
},

{
number:4,

question:"Теңсіздіктің шешімін табыңыз.",

visual:`
<div class="visual-box math">
145 − (41x − 3x²) ≤ 3(x − 7)²
</div>
`,

options:[
"[−2; +∞)",
"(−∞; 2)",
"[2; +∞)",
"(−∞; 2]",
"(−∞; −2]"
],

correct:3,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
Жақшаларды ашамыз:
<span class="solution-formula">
145 − 41x + 3x² ≤ 3(x² − 14x + 49)
</span>
</li>

<li>
<b>2-қадам.</b>
Оң жақты ашамыз:
<span class="solution-formula">
145 − 41x + 3x² ≤ 3x² − 42x + 147
</span>
</li>

<li>
<b>3-қадам.</b>
Екі жақтағы 3x² мүшелері қысқарады:
<span class="solution-formula">
145 − 41x ≤ −42x + 147
</span>
</li>

<li>
<b>4-қадам.</b>
42x-ті сол жаққа қосамыз:
<span class="solution-formula">
145 + x ≤ 147
</span>
</li>

<li>
<b>5-қадам.</b>
<span class="solution-formula">
x ≤ 2
</span>
</li>

<li>
<b>Жауабы:</b>
(−∞; 2].
</li>

</ol>
`,

keyFact:"Теңсіздіктің шешімі: x ≤ 2."
},

{
number:5,

question:"Егер |10x − 5| > 7 және x < 1 болса, онда келесі тұжырымдардың арасындағы x-тің қабылдайтын мәнін табыңыз.",

options:[
"0",
"0,8",
"−0,6",
"−0,16",
"0,6"
],

correct:2,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
Модульді екі жағдайға бөлеміз:
<span class="solution-formula">
10x − 5 &gt; 7
</span>
немесе
<span class="solution-formula">
10x − 5 &lt; −7
</span>
</li>

<li>
<b>2-қадам.</b>
Бірінші теңсіздік:
<span class="solution-formula">
10x &gt; 12 → x &gt; 1,2
</span>
</li>

<li>
<b>3-қадам.</b>
Екінші теңсіздік:
<span class="solution-formula">
10x &lt; −2 → x &lt; −0,2
</span>
</li>

<li>
<b>4-қадам.</b>
Қосымша шарт бойынша x &lt; 1. Сондықтан x &gt; 1,2 тармағы жарамайды.
</li>

<li>
<b>5-қадам.</b>
Берілген нұсқаларды тексереміз. −0,2-ден кіші жалғыз сан:
<span class="solution-formula">
−0,6
</span>
</li>

</ol>
`,

keyFact:"Шарттарды қанағаттандыратын мән: −0,6."
},

{
number:6,

question:"50 адамнан сауалнама жүргізгенде 15 адам тек қана классикалық музыканы, 11 адам тек қана рэп және 10 адам рэпті де, классикалық музыканы да тыңдайтындарын айтты. Музыканы тыңдамайтын адам санын табыңыз.",

visual:`
<div class="visual-box">

<svg
viewBox="0 0 650 390"
role="img"
aria-label="Классикалық музыка мен рэп тыңдаушыларының Венн диаграммасы"

options:[

correct:2,

explanation:`
<ol class="solution-steps">

<li>
<b>1-қадам.</b>
Тек классикалық музыка тыңдайтындар:
<span class="solution-formula">
15 адам
</span>
</li>

<li>
<b>2-қадам.</b>
Екі музыканы да тыңдайтындар:
<span class="solution-formula">
10 адам
</span>
</li>

<li>

<li>
<b>4-қадам.</b>
Кемінде бір музыканы тыңдайтындардың жалпы саны:

keyFact:"Музыка тыңдамайтындар саны: 14."
},

{
number:7,

function renderQuestion(
  question,
  questionIndex,
  sectionName
) {
  const visualHtml =
    question.visual || "";

  const contextHtml =
    question.context || "";

  const optionsHtml =
    question.options
      .map((option, optionIndex) => {
        return `
          <label
            class="option"
            data-option-index="${optionIndex}"
          >

            <input
              type="radio"
              name="${sectionName}Question${questionIndex}"
              value="${optionIndex}"
            >

            <span class="option-letter">
              ${letters[optionIndex]})
            </span>

            <span>
              ${option}
            </span>

          </label>
        `;
      })
      .join("");

  return `
    <article
      class="question"
      data-question-index="${questionIndex}"
    >

      <div class="question-number">
        ${question.number}-сұрақ
      </div>

      ${contextHtml}

      <h3 class="question-title">
        ${question.question}
      </h3>

      ${visualHtml}

      <div class="options">
        ${optionsHtml}
      </div>

      <div class="explanation">

        <div class="question-score"></div>

        <div class="correct-answer">

          Дұрыс жауап:

        <div class="explanation-text">
          ${question.explanation}
        </div>

        <div class="key-fact">
          ${question.keyFact}
        </div>

      </div>

    </article>
  `;
}

function countAnsweredQuestions(quizId) {
  const questionBlocks =
    document.querySelectorAll(
      `#${quizId} .question`
    );

  let answered = 0;

  questionBlocks.forEach(
    questionBlock => {
      if (
        questionBlock.querySelector(
          "input:checked"
        )
      ) {
        answered++;
      }
    }
  );

  return answered;
}

function showSectionResults(
  questions,
  quizId,
  resultId,
  scoreId
) {
  const quiz =
    document.getElementById(
      quizId
    );

  const questionBlocks =
    quiz.querySelectorAll(
      ".question"
    );

  let totalScore = 0;

  questionBlocks.forEach(
    (questionBlock, questionIndex) => {
      const question =
        questions[questionIndex];

      const selectedInput =
        questionBlock.querySelector(
          "input:checked"
        );

      const selectedIndex =
        selectedInput
          ? Number(selectedInput.value)
          : null;

      const optionBlocks =
        questionBlock.querySelectorAll(
          ".option"
        );

      optionBlocks.forEach(
        (optionBlock, optionIndex) => {
          optionBlock.classList.remove(
            "correct",
            "wrong"
          );

          if (
            optionIndex === question.correct
          ) {
            optionBlock.classList.add(
              "correct"
            );
          }

          if (
            selectedIndex === optionIndex &&
            selectedIndex !== question.correct
          ) {
            optionBlock.classList.add(
              "wrong"
            );
          }
        }
      );

      const scoreBlock =
        questionBlock.querySelector(
          ".question-score"
        );

      scoreBlock.classList.remove(
        "full",
        "zero"
      );

      if (
        selectedIndex === question.correct
      ) {
        totalScore++;

        scoreBlock.classList.add(
          "full"
        );

        scoreBlock.textContent =
          "Бұл сұрақ бойынша: 1 / 1 балл";
      } else {
        scoreBlock.classList.add(
          "zero"
        );

        scoreBlock.textContent =
          "Бұл сұрақ бойынша: 0 / 1 балл";
      }

      questionBlock.classList.add(
        "checked"
      );

      questionBlock
        .querySelectorAll("input")
        .forEach(input => {
          input.disabled = true;
        });
    }
  );

  document.getElementById(
    scoreId
  ).textContent =
    `${totalScore} / ${questions.length}`;

  const resultCard =
    document.getElementById(
      resultId
    );

  resultCard.classList.add(
    "show"
  );

  resultCard.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

  showSectionResults(

    "criticalQuiz",

  scoreId,
  progressTextId,
  progressBarId
) {
  const quiz =
    document.getElementById(
      quizId
    );

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.checked = false;
      input.disabled = false;
    });

  quiz
    .querySelectorAll(".option")
    .forEach(option => {
      option.classList.remove(
        "correct",
        "wrong"
      );
    });

  quiz
    .querySelectorAll(".question")
    .forEach(questionBlock => {
      questionBlock.classList.remove(
        "checked"
      );

      const scoreBlock =
        questionBlock.querySelector(
          ".question-score"
        );

      scoreBlock.textContent = "";

      scoreBlock.classList.remove(
        "full",
        "zero"
      );
    });

  document.getElementById(
    resultId
  ).classList.remove(
    "show"
  );

  document.getElementById(
    scoreId
  ).textContent =
    `0 / ${questions.length}`;

  document.getElementById(
    progressTextId
  ).textContent =
    `0 / ${questions.length}`;

  document.getElementById(
    progressBarId
  ).style.width =
    "0%";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

function resetCriticalTest() {
  resetSection(
    criticalQuestions,
    "criticalQuiz",
    "criticalResult",
    "criticalScore",
    "criticalProgressText",
    "criticalProgressBar"
  );
}

function resetAnalyticalTest() {
  resetSection(
    analyticalQuestions,
    "analyticalQuiz",
    "analyticalResult",
    "analyticalScore",
    "analyticalProgressText",
    "analyticalProgressBar"
  );
}

createAnalyticalSection();

renderCriticalQuestions();

renderAnalyticalQuestions();

activateNavigation();

updateCriticalProgress();

updateAnalyticalProgress();

</script>

</div>
</body>
</html>
